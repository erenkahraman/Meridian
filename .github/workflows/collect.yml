# Scheduled data collection for Meridian.
#
# Runs the existing collector (scripts/collect.js) every 12 hours, exactly as a
# manual `npm run collect -- --all` would: it queries the LLM for all 50 policy
# questions, analyzes each answer, and writes one new run (plus its responses
# and mentions) to Supabase. The dashboard reads from Supabase, so the
# "OECD score over time" chart accumulates a real data point on each run.
#
# This job is completely independent of the Vercel deployment — it never builds
# or deploys the site, it only writes rows to the database.
name: Collect OECD AI visibility snapshot

on:
  schedule:
    # 00:00 and 12:00 UTC every day (every 12 hours). Cron is always UTC.
    - cron: "0 */12 * * *"
  # Lets you trigger a run on demand from the GitHub Actions tab.
  workflow_dispatch:

# Least privilege: the job only needs to read the checked-out code.
permissions:
  contents: read

# Never let two collections overlap; a queued run waits for the current one.
concurrency:
  group: meridian-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run collector (all 50 questions → Supabase)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npm run collect -- --all --notes "scheduled (GitHub Actions)"
